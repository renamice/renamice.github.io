## Disadvantages

-  Slower Execution Speed
-  Global Interpreter Lock (GIL)<!-- .element: class="fragment" data-fragment-index="1" -->
-  Memory Consumption<!-- .element: class="fragment" data-fragment-index="2" -->
</div>

<aside class="notes"><p>1:
interpreted language =&gt; slower compared to compiled languages like C or Java.
disadvantage for performance-critical applications where speed is a key factor.</p>
<p>2:
Python’s GIL can be a bottleneck in multi-threaded programs.
only one thread executes Python bytecode at a time
limits the performance of CPU-bound multi-threaded applications.</p>
<p>3:
dynamic nature =&gt; higher memory usage. 
concern for handling large amounts of data
bad for memory-constrained environments.</p>
</aside></script></section></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-auto-animate="true" -->
